name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev python3-venv build-essential git
          sudo apt install -y autoconf automake libtool pkg-config
          sudo apt install -y libffi-dev libssl-dev
          sudo apt install -y zlib1g-dev libncurses5-dev libncursesw5-dev
          sudo apt install -y libtinfo6 cmake

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Init Buildozer
        run: |
          buildozer init

      - name: Configure Buildozer
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          p = Path('buildozer.spec')
          text = p.read_text()

          def set_value(key, value):
              nonlocal text
              pattern = re.compile(rf'^{re.escape(key)}\s*=\s*.*$', re.M)
              if pattern.search(text):
                  text = pattern.sub(f'{key} = {value}', text, count=1)
              else:
                  text += f'\n{key} = {value}\n'

          values = {
              'title': 'Cosmic Shard',
              'package.name': 'cosmicshard',
              'package.domain': 'com.neiro',
              'source.include_exts': 'py,png,jpg,json',
              'requirements': 'python3,pygame',
              'fullscreen': '1',
              'orientation': 'portrait',
              'android.api': '31',
              'android.minapi': '21',
              'android.build_tools': '34.0.3',
              'android.arch': 'arm64-v8a',
              'android.archs': 'arm64-v8a',
              'android.allow_python2': '0',
              'android.sdk_path': os.environ.get('ANDROID_SDK_ROOT', os.path.expanduser('~/android-sdk')),
          }
          for key, value in values.items():
              set_value(key, value)

          p.write_text(text)
          PY

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/android-sdk}"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-31" "build-tools;34.0.3"

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/android-sdk}"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-shard-apk
          path: bin/*.apk
