name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev python3-venv build-essential git
          sudo apt install -y autoconf automake libtool pkg-config
          sudo apt install -y libffi-dev libssl-dev
          sudo apt install -y zlib1g-dev libncurses5-dev libncursesw5-dev
          sudo apt install -y libtinfo6 cmake

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Init Buildozer
        run: |
          buildozer init

      - name: Configure Buildozer
        run: |
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          python - <<'PY'
          from pathlib import Path
          import os

          p = Path('buildozer.spec')
          if not p.exists():
              raise SystemExit('buildozer.spec was not generated')

          text = p.read_text()
          replacements = [
              ('title =', 'title = Cosmic Shard'),
              ('package.name =', 'package.name = cosmicshard'),
              ('package.domain =', 'package.domain = com.neiro'),
              ('source.include_exts =', 'source.include_exts = py,png,jpg,json'),
              ('requirements =', 'requirements = python3,pygame'),
              ('fullscreen =', 'fullscreen = 1'),
              ('orientation =', 'orientation = portrait'),
              ('android.api =', 'android.api = 31'),
              ('android.minapi =', 'android.minapi = 21'),
              ('android.build_tools =', 'android.build_tools = 37.0.0'),
              ('android.arch =', 'android.arch = arm64-v8a'),
              ('android.archs =', 'android.archs = arm64-v8a'),
              ('android.allow_python2 =', 'android.allow_python2 = 0'),
              ('android.sdk_path =', f"android.sdk_path = {os.environ.get('ANDROID_SDK_ROOT', os.path.expanduser('~/android-sdk'))}"),
          ]

          lines = text.splitlines()
          updated = []
          for line in lines:
              stripped = line.strip()
              if stripped.startswith('title ='):
                  updated.append('title = Cosmic Shard')
              elif stripped.startswith('package.name ='):
                  updated.append('package.name = cosmicshard')
              elif stripped.startswith('package.domain ='):
                  updated.append('package.domain = com.neiro')
              elif stripped.startswith('source.include_exts ='):
                  updated.append('source.include_exts = py,png,jpg,json')
              elif stripped.startswith('requirements ='):
                  updated.append('requirements = python3,pygame')
              elif stripped.startswith('fullscreen ='):
                  updated.append('fullscreen = 1')
              elif stripped.startswith('orientation ='):
                  updated.append('orientation = portrait')
              elif stripped.startswith('android.api ='):
                  updated.append('android.api = 31')
              elif stripped.startswith('android.minapi ='):
                  updated.append('android.minapi = 21')
              elif stripped.startswith('android.build_tools ='):
                  updated.append('android.build_tools = 37.0.0')
              elif stripped.startswith('android.arch ='):
                  updated.append('android.arch = arm64-v8a')
              elif stripped.startswith('android.archs ='):
                  updated.append('android.archs = arm64-v8a')
              elif stripped.startswith('android.allow_python2 ='):
                  updated.append('android.allow_python2 = 0')
              elif stripped.startswith('android.sdk_path ='):
                  updated.append(f"android.sdk_path = {os.environ.get('ANDROID_SDK_ROOT', os.path.expanduser('~/.buildozer/android/platform/android-sdk'))}")
              else:
                  updated.append(line)

          p.write_text('\n'.join(updated) + '\n')
          PY

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

          if [ ! -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ] && [ ! -x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
            curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
            rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
            unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
            if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
              mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
            fi
          fi

          SDKMANAGER_BIN="$(find "$ANDROID_SDK_ROOT" -path '*/bin/sdkmanager' -type f 2>/dev/null | head -n 1)"
          if [ -z "$SDKMANAGER_BIN" ]; then
            echo "sdkmanager was not found after extraction" >&2
            find "$ANDROID_SDK_ROOT" -maxdepth 5 -type f 2>/dev/null | head -100 >&2
            exit 1
          fi

          chmod +x "$SDKMANAGER_BIN"
          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$SDKMANAGER_BIN" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"

          ANDROID_BIN="$(find "$ANDROID_SDK_ROOT" -path '*/bin/android' -type f 2>/dev/null | head -n 1)"
          if [ -n "$ANDROID_BIN" ]; then
            chmod +x "$ANDROID_BIN"
            ln -sf "$ANDROID_BIN" "$ANDROID_SDK_ROOT/tools/bin/android"
          else
            ln -sf "$SDKMANAGER_BIN" "$ANDROID_SDK_ROOT/tools/bin/android"
          fi

          yes | "$SDKMANAGER_BIN" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          "$SDKMANAGER_BIN" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-31" "build-tools;37.0.0"

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export ANDROIDSDK="$ANDROID_SDK_ROOT"
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/tools/bin:$PATH"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-shard-apk
          path: bin/*.apk
