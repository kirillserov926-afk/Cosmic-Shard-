name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev python3-venv build-essential git
          sudo apt install -y autoconf automake libtool pkg-config
          sudo apt install -y libffi-dev libssl-dev
          sudo apt install -y zlib1g-dev libncurses5-dev libncursesw5-dev
          sudo apt install -y libtinfo6 cmake

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Init Buildozer
        run: |
          buildozer init

      - name: Configure Buildozer
        run: |
          sed -i 's/^title = .*/title = Cosmic Shard/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = cosmicshard/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = com.neiro/' buildozer.spec
          sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,json/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,pygame/' buildozer.spec
          sed -i 's/^fullscreen = .*/fullscreen = 1/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^android.arch = .*/android.arch = arm64-v8a/' buildozer.spec
          sed -i 's/^android.api = .*/android.api = 31/' buildozer.spec
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^android.build_tools = .*/android.build_tools = 34.0.3/' buildozer.spec
          sed -i 's/^# android.allow_python2 = .*/android.allow_python2 = 0/' buildozer.spec

      - name: Accept Android SDK licenses
        run: |
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          if [ -x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            echo y | "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --licenses || true
            echo y | "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "platform-tools" "platforms;android-31" "build-tools;34.0.3" || true
          else
            echo "sdkmanager not present yet; continuing"
          fi
          if [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo y | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true
            echo y | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-31" "build-tools;34.0.3" || true
          fi

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-shard-apk
          path: bin/*.apk
